[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitm-1
framework = arduino

; ---------- Serial ----------
monitor_speed = 115200
upload_speed  = 921600

; ---------- Libraries ----------
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0    ; JSON parsing for weather + Twilio
    ricmoo/QRCode @ ^0.0.1            ; QR code generator for the setup screen
    ; WiFiClientSecure, WebServer, DNSServer, Preferences are all part of
    ; the ESP32 Arduino core — no extra install needed.
    ; Waveshare EPD driver + GUI_Paint are in src/ directly (no lib needed).

; ---------- Build flags ----------
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM              ; the S3 DevKit has PSRAM, helps with large buffers

; ---------- Partition ----------
; Use the "huge_app" partition table so there's room for TLS + large images
board_build.partitions = huge_app.csv
